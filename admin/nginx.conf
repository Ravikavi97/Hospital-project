server {
    listen 80;
    server_name _;

    # Hide Nginx version
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://ui-avatars.com https://via.placeholder.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── API proxy ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── Static assets — long cache with immutable ─────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # No caching for HTML (ensures fresh app shell)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript;
    gzip_comp_level 6;
}
